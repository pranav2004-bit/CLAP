groups:
  - name: clap-p1-critical
    rules:
      - alert: ClapWorkersDown
        expr: clap_active_workers < 1
        for: 5m
        labels:
          severity: P1
          team: platform
        annotations:
          summary: "CLAP workers unavailable"
          description: "No active CLAP worker pools detected for more than 5 minutes."

      - alert: ClapPipelineStalled
        expr: clap_celery_queue_depth > 2000
        for: 5m
        labels:
          severity: P1
          team: platform
        annotations:
          summary: "CLAP pipeline stalled"
          description: "Queue depth is above 2000 for 5 minutes; submissions are backing up."

      - alert: ClapDLQCritical
        expr: clap_dlq_unresolved_count > 50
        for: 10m
        labels:
          severity: P1
          team: platform
        annotations:
          summary: "CLAP DLQ critical volume"
          description: "Unresolved DLQ entries exceeded 50."

  - name: clap-p2-warning
    rules:
      - alert: ClapQueueDepthWarning
        expr: clap_celery_queue_depth > 500
        for: 5m
        labels:
          severity: P2
          team: clap-ops
        annotations:
          summary: "CLAP queue depth warning"
          description: "One or more queue depths are above 500 for 5 minutes."

      - alert: ClapLLMP95High
        expr: histogram_quantile(0.95, sum by (le) (rate(clap_llm_request_duration_seconds_bucket[5m]))) > 60
        for: 10m
        labels:
          severity: P2
          team: clap-ops
        annotations:
          summary: "LLM latency elevated"
          description: "LLM request p95 is above 60s for 10 minutes."

      - alert: ClapEmailFailureRateHigh
        expr: (
          sum(rate(clap_email_send_failures_total[1h]))
          /
          clamp_min(sum(rate(clap_submissions_total{status="COMPLETE"}[1h])), 1)
        ) > 0.05
        for: 15m
        labels:
          severity: P2
          team: clap-ops
        annotations:
          summary: "Email failure rate above 5%"
          description: "Email failure ratio has been above 5% over the past hour."

  - name: clap-p3-info
    rules:
      - alert: ClapDLQEntryCreated
        expr: increase(clap_dlq_unresolved_count[15m]) > 0
        for: 0m
        labels:
          severity: P3
          team: clap-ops
        annotations:
          summary: "New DLQ entries detected"
          description: "One or more new unresolved DLQ entries were created in the last 15 minutes."
