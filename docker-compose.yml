# ================================================================
# CLAP Full-Stack — Docker Compose
# ================================================================
# Services:
#   redis          — Message broker + result backend + rate-limit cache
#   django         — Django API server (Gunicorn, gthread workers)
#   celery-llm     — LLM evaluation tasks (low concurrency, memory-intensive)
#   celery-reports — PDF report generation (low concurrency, memory-intensive)
#   celery-scoring — Rule-based scoring + email (high concurrency, lightweight)
#   celery-beat    — Periodic task scheduler (DLQ sweeper every 15 min)
#
# Usage:
#   First time:
#     cp django-backend/.env.example django-backend/.env
#     # Fill in django-backend/.env with your values, then:
#     docker compose up --build
#
#   Daily:
#     docker compose up          # start all services
#     docker compose down        # stop and remove containers
#     docker compose logs -f     # follow all logs
#     docker compose logs -f django celery-llm  # follow specific services
#
#   Run migrations (first time or after git pull):
#     docker compose exec django python manage.py migrate
#
#   Django shell:
#     docker compose exec django python manage.py shell
#
# Scaling (horizontal, production):
#   docker compose up --scale celery-llm=2 --scale celery-scoring=3
# ================================================================

services:

  # ── Nginx Reverse Proxy ──────────────────────────────────────────
  # Entry point for all HTTP traffic on port 80.
  # Provides: rate limiting, gzip, client buffering, X-User-Id strip,
  # real-IP forwarding, keepalive to Gunicorn, security headers.
  #
  # TLS (HTTPS): add a port 443 server block + Certbot/ACM in production.
  # Scale: nginx:1.25-alpine handles 10 000+ concurrent connections on one core.
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    depends_on:
      django:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://127.0.0.1/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Certbot: Let's Encrypt SSL certificate manager ───────────────
  # First-time setup: run scripts/init-ssl.sh (creates and stores cert)
  # Ongoing: this service auto-renews every 12 hours (certs expire in 90 days)
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    # Check for renewal every 12 hours; Let's Encrypt renews within 30 days of expiry
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

  # ── Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SANJIVO_CLAP}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── PgBouncer: Connection Pooler ─────────────────────────────────
  # Sits between Django/Celery and PostgreSQL (or Aurora in production).
  #
  # WHY THIS IS CRITICAL FOR 3000 STUDENTS:
  #   Django gthread: 5 workers × 8 threads = 40 threads.
  #   Celery workers: 12 + 2 + 2 = 16 concurrent workers.
  #   Total direct DB connections without pooling: ~56, growing on bursts.
  #   Aurora Serverless max_connections = GREATEST(mem/9531392, 100).
  #   Under peak load (worker recycles, connection churn) direct connections
  #   can spike 3-5x, exhausting the DB connection limit and causing:
  #   "FATAL: remaining connection slots reserved for replication" errors.
  #
  # HOW PGBOUNCER SOLVES THIS:
  #   pool_mode = transaction: Django acquires a DB connection only for the
  #   duration of a transaction (typically 5-50ms), then releases it.
  #   default_pool_size = 20: only 20 real DB connections maintained.
  #   400 Django/Celery clients can multiplex through those 20 connections.
  #   DB connection count stays flat regardless of user load.
  #
  # LOCAL DEV: proxies to the local `db` service (postgres:5432)
  # PRODUCTION: set PGBOUNCER_DB_HOST=<aurora-endpoint> in .env
  #
  # Django connects to: pgbouncer:5432 (via DB_HOST=pgbouncer in env_file)
  # PgBouncer connects to: ${PGBOUNCER_DB_HOST:-db}:${PGBOUNCER_DB_PORT:-5432}
  pgbouncer:
    # edoburu/pgbouncer: actively maintained, Docker Hub, Alpine-based.
    # Bitnami deprecated their Docker Hub images in 2024 — use this instead.
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    # env_file provides DB_NAME, DB_USER, DB_PASSWORD from the SAME source as
    # Django — guarantees PgBouncer uses the identical credentials to connect
    # to the backend DB. Without this, docker-compose substitution falls back
    # to defaults and PgBouncer connects with the wrong password.
    env_file:
      - ./django-backend/.env
    environment:
      # ── Target database (real Postgres / RDS) ─────────────────────
      # DB_HOST here OVERRIDES the DB_HOST=pgbouncer set in env_file
      # (which is Django's value — pgbouncer must NOT connect to itself).
      # Production: set PGBOUNCER_DB_HOST=<rds-endpoint> in ~/CLAP/.env
      #             (root .env — used by docker-compose for substitution)
      # Local dev:  defaults to the local `db` postgres container.
      DB_HOST: ${PGBOUNCER_DB_HOST:-db}
      DB_PORT: ${PGBOUNCER_DB_PORT:-5432}
      # ── Auth type: scram-sha-256 ───────────────────────────────────
      # CRITICAL: edoburu/pgbouncer stores the password in userlist.txt as
      # PLAINTEXT only when AUTH_TYPE is "plain" or "scram-sha-256".
      # Any other value (including "trust" and "md5") causes it to store
      # an md5 hash — which CANNOT be used for SCRAM-SHA-256 authentication
      # to RDS PostgreSQL 15 (SCRAM requires the plaintext password).
      # scram-sha-256: plaintext stored → PgBouncer→RDS SCRAM works ✓
      #                clients (Django) authenticate to PgBouncer via SCRAM ✓
      AUTH_TYPE: scram-sha-256
      # ── TLS: SSL mode for PgBouncer → backend DB connection ─────────
      # Production (RDS): set PGBOUNCER_SERVER_TLS_SSLMODE=require in ~/CLAP/.env
      # Local dev (plain postgres container): defaults to "prefer"
      #   prefer = tries SSL first, falls back to plain — safe for both.
      # Client (Django→PgBouncer) does NOT need SSL — internal Docker network.
      SERVER_TLS_SSLMODE: ${PGBOUNCER_SERVER_TLS_SSLMODE:-prefer}
      # ── Pool configuration ────────────────────────────────────────
      # transaction mode: connection released after each transaction.
      # Most efficient for Django's short-lived request/response cycle.
      POOL_MODE: transaction
      # 100 real RDS connections.
      # RDS db.t3.large max_connections ≈ 170; using 100 = 59% of limit.
      # Supports 144 Django threads + 36 Celery workers multiplexing through 100
      # connections. Each connection serves ~50 tx/s at 20ms avg → pool delivers
      # ~5 000 tx/s total — 3× headroom over expected 10 000-user peak load.
      DEFAULT_POOL_SIZE: "100"
      # 10 warm standby connections always open.
      # Eliminates cold-start latency on first post-idle request (~100-300ms saved
      # per TCP+TLS+auth handshake to RDS). Critical after low-traffic nights.
      MIN_POOL_SIZE: "10"
      # 20 extra connections reserved for traffic spikes and admin operations.
      # Spike buffer handles exam-end burst (thousands of students submitting
      # simultaneously) without pool exhaustion.
      RESERVE_POOL_SIZE: "20"
      # Use reserve pool after 3 seconds of regular pool being exhausted.
      RESERVE_POOL_TIMEOUT: "3"
      # 2000 client connections allowed (144 Django + 36 Celery + 1820 headroom).
      # Headroom absorbs horizontal scaling (additional Celery worker instances)
      # and any connection leak before it causes a hard failure.
      MAX_CLIENT_CONN: "2000"
      # Fail fast: if no pool slot available after 15 s → return error to client.
      # 15 s is the right balance: long enough for a transient spike to drain,
      # short enough to prevent Nginx upstream queue from growing unbounded.
      # (Old value 30 s caused downstream timeout cascades during exam-end surges.)
      QUERY_WAIT_TIMEOUT: "15"
      # Timeout for PgBouncer establishing connection to RDS (TCP+TLS+auth).
      SERVER_CONNECT_TIMEOUT: "15"
      # Retry failed server connections once before giving up.
      SERVER_LOGIN_RETRY: "2"
      # ── TCP keep-alives (detect dead RDS connections before clients notice) ─────
      # Without keep-alives, a silently-dropped RDS connection (network blip,
      # RDS maintenance failover) appears healthy to PgBouncer. The next query
      # fails with "connection reset" and the client gets a 500 error.
      # TCP keep-alives probe the connection every 60s → dead connections detected
      # within 110s (60s idle + 5 probes × 10s) and removed from the pool.
      TCP_KEEPALIVE: "1"
      TCP_KEEPIDLE: "60"          # send first probe after 60s of idle
      TCP_KEEPINTVL: "10"         # probe every 10s after the first
      TCP_KEEPCNT: "5"            # 5 failed probes = connection declared dead
      # Kill idle server connections after 10 minutes (prevents RDS stale).
      SERVER_IDLE_TIMEOUT: "600"
      # Kill idle client connections after 10 minutes.
      CLIENT_IDLE_TIMEOUT: "600"
      # Log level — warning keeps logs quiet in production.
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"
    ports:
      - "5432:5432"    # expose on host for local psql/migrations
    # PgBouncer is pure C, very low memory. 256 MB is a generous ceiling.
    # A memory leak or misconfiguration that causes runaway growth will be
    # caught here before it can starve Django, Redis, or Celery.
    mem_limit: 256m
    memswap_limit: 256m
    # Raise FD limit — PgBouncer needs one FD per client + one per server connection.
    # 1000 client conns + 40 server conns + OS overhead = well within 65536.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # nc (busybox netcat) is always present in Alpine — checks port is open.
      # pg_isready is NOT included in edoburu/pgbouncer image.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # ── Memory cap ────────────────────────────────────────────────
    # 3 GB maxmemory accommodates 10 000+ concurrent users:
    #   ~200 MB  active Celery task queue messages (10 000 pending tasks × 20 KB)
    #   ~100 MB  rate-limit counters (10 000 students × 10 KB per window)
    #   ~ 50 MB  JWT/session cache entries
    #   ~ 50 MB  idempotency and submission-dedup keys
    #   ~ 50 MB  OpenAI quota tracker counters
    #   ~300 MB  AOF write buffer + fork COW overhead during rewrite
    #   Total working set ≈ 750 MB; 3 GB ceiling gives 4× headroom.
    #
    # volatile-lru (NOT allkeys-lru):
    #   Only evicts keys with a TTL. Rate-limit buckets and session tokens have
    #   TTLs → eligible for eviction (fine — they're transient).
    #   Celery task queue lists have NO TTL → NEVER evicted.
    #   allkeys-lru would silently drop pending scoring jobs under pressure.
    #
    # appendonly + everysec:
    #   AOF replay on crash — max 1 second of data loss.
    #
    # no-appendfsync-on-rewrite:
    #   During AOF rewrite (triggered automatically at 64 MB), the main thread
    #   must NOT block on fsync. Without this flag, a 10 000-user peak + AOF
    #   rewrite = 200-500 ms Redis stall → mass request timeouts.
    #
    # lazyfree-*:
    #   Key deletion/eviction/expiry runs in a background thread — prevents
    #   the main event loop from stalling while freeing large data structures.
    #
    # hz 20:
    #   Redis background tasks (expiry scan, eviction) run 20× per second
    #   instead of default 10×. Ensures TTL-expired keys are reclaimed faster
    #   under high write pressure, preventing memory overshoot.
    #
    # tcp-keepalive 300:
    #   OS-level TCP probe every 300 s. Detects silently-closed client
    #   connections (crashed Django worker, network blip) and releases FDs.
    #
    # mem_limit 3584m = 3.5 GB:
    #   512 MB headroom above maxmemory for AOF buffer, fork COW copy, and
    #   Redis internal metadata. Without this margin, Linux OOM-killer fires
    #   BEFORE Redis's own eviction logic, killing the container abruptly.
    mem_limit: 4608m
    memswap_limit: 4608m    # disable swap — hard OOM-kill, no disk thrashing
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: >
      redis-server
        --maxmemory 4gb
        --maxmemory-policy volatile-lru
        --appendonly yes
        --appendfsync everysec
        --no-appendfsync-on-rewrite yes
        --auto-aof-rewrite-percentage 100
        --auto-aof-rewrite-min-size 64mb
        --lazyfree-lazy-eviction yes
        --lazyfree-lazy-expire yes
        --lazyfree-lazy-server-del yes
        --hz 20
        --tcp-keepalive 300
        --loglevel notice
        --latency-tracking yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Django API server ───────────────────────────────────────────
  django:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./django-backend/.env
    environment:
      # Override Redis URLs to use the compose service name
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      # 9 workers × 16 threads = 144 concurrent request threads (t3.xlarge: 4 vCPU).
      # Workers: (2×CPU)+1 = 9 for 4-vCPU EC2 (t3.xlarge). Formula yields the right
      #          balance between CPU utilisation and I/O parallelism for gthread workers.
      # Threads: 16 per worker — gthread is I/O-bound; threads block on DB/S3/SES 10-50ms,
      #          releasing the GIL during every network wait. 144 threads × 50ms avg =
      #          ~2 880 req/s theoretical; realistic mixed load: ~1 200-1 500 req/s.
      #          10 000 concurrent users × 1 req/15s avg = ~667 req/s peak — 2× headroom.
      # Memory:  9 × ~200 MB (preload_app CoW) = 1.8 GB + 700 MB overhead = ~2.5 GB;
      #          2.5 GB container limit gives a tight but safe ceiling on t3.xlarge (16 GB).
      # DB conns: up to 144 PgBouncer client slots (not raw RDS — pooler multiplexes 100).
      # NOTE: requires t3.xlarge (4 vCPU, 16 GB). On t3.large reduce back to "5".
      GUNICORN_WORKERS: "9"
      GUNICORN_THREADS: "16"
      GUNICORN_TIMEOUT: "120"
      # Graceful timeout: 30s — lets in-flight requests finish during rolling deploys
      GUNICORN_GRACEFUL_TIMEOUT: "30"
      # Keepalive: 5s — reuse connections from nginx upstream keepalive pool
      GUNICORN_KEEPALIVE: "5"
      # Recycle workers after 2000 requests (±200 jitter) to flush ORM/memory drift.
      # Spread restarts prevent thundering herd on simultaneous worker recycle.
      GUNICORN_MAX_REQUESTS: "2000"
      GUNICORN_MAX_REQUESTS_JITTER: "200"
      # Skip automatic migrations for production-style external DBs
      RUN_MIGRATIONS: "false"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Memory cap: 9 workers × ~200 MB (CoW) = 1.8 GB + 700 MB overhead = ~2.5 GB working set.
    # 2.56 GB limit gives 60 MB hard ceiling — OOM-kills a single rogue worker before
    # it can starve Redis, PgBouncer, or Celery containers on the same host.
    # Without a cap, a memory leak in one worker drains all EC2 RAM and triggers a
    # cascade OOM-kill of every container simultaneously (the worst possible failure mode).
    mem_limit: 2560m
    memswap_limit: 2560m    # disable swap — hard OOM-kill, no disk thrashing
    # Raise open-file limit so Django can hold 80 simultaneous socket connections
    # (threads) + PgBouncer connections + S3 HTTP connections without EMFILE errors.
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./django-backend/api:/app/api          # live code sync — no rebuild needed
      - ./django-backend/clap_backend:/app/clap_backend
      - ./django-backend/media:/app/media
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')\" 2>/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Worker: LLM evaluation ───────────────────────────────
  # Queue: llm_evaluation
  #
  # Rate-limit strategy (gpt-4o — Tier 1, 3 primary keys):
  #   • gpt-4o: 500 RPM/key × 3 keys = 1 500 RPM effective throughput.
  #   • Whisper: 50 RPM/key × 3 keys = 150 RPM (tracked separately in Redis).
  #   • No Celery task-level rate_limit — QuotaTracker is the authoritative limiter.
  #   • concurrency=2: 2 parallel LLM+Whisper calls — safe at Tier 1 RPM headroom.
  #     Each call takes 3-20s so 2 concurrent workers ≈ 6-40 effective RPM per worker.
  #   • Scale concurrency to 4 on Tier 2+ (5 000 RPM/key).
  #   • Scale horizontally with: docker compose up --scale celery-llm=2
  #
  # max-tasks-per-child=10: recycles worker after 10 tasks.
  # Audio preprocessing (FFmpeg denoising) runs here — each task leaks ~50MB
  # of subprocess memory. At 20 tasks that's ~1GB → OOM kill → silent worker
  # death. Lowering to 10 keeps peak RSS under 600MB, well within safe limits.
  # mem_limit=1.5g: Docker OOM kill at 1.5GB as a hard safety net.
  celery-llm:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    mem_limit: 1536m          # P1-6: hard OOM kill at 1.5 GB (FFmpeg leak safety net)
    memswap_limit: 1536m      # disable swap — OOM-kill immediately, no swap thrash
    env_file:
      - ./django-backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-backend/api:/app/api              # live code sync
      - ./django-backend/clap_backend:/app/clap_backend
      - ./django-backend/media:/app/media
    command: >
      python -m celery -A clap_backend worker
        --loglevel=info
        --queues=llm_evaluation
        --concurrency=2
        --hostname=llm@%h
        --max-tasks-per-child=10

  # ── Celery Worker: Report generation ───────────────────────────
  # Queue: report_gen
  # Concurrency: 2  (PDF generation can be memory-intensive)
  celery-reports:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    mem_limit: 1024m          # PDF generation (WeasyPrint/ReportLab): ~300 MB per task × 2 = 600 MB + overhead
    memswap_limit: 1024m
    env_file:
      - ./django-backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-backend/api:/app/api              # live code sync
      - ./django-backend/clap_backend:/app/clap_backend
      - ./django-backend/media:/app/media
    command: >
      python -m celery -A clap_backend worker
        --loglevel=info
        --queues=report_gen
        --concurrency=2
        --hostname=reports@%h
        --max-tasks-per-child=100

  # ── Celery Worker: Rule scoring + Email ─────────────────────────
  # Queues: rule_scoring, email
  # Concurrency: 32  (lightweight, fast tasks — pure DB + rule logic)
  #
  # 32 prefork workers × ~50 MB RSS each = 1.6 GB working set.
  # At 50ms/task: 32 workers deliver ~640 tasks/s — drains 10 000 simultaneous
  # exam submissions in ~15 s (acceptable async latency for score display).
  # max-tasks-per-child=500: recycles each worker after 500 tasks, clearing
  # ORM query-plan cache and any thread-local memory drift before it accumulates.
  # mem_limit 2048m: 32 × ~50 MB = 1.6 GB + 448 MB overhead. Docker OOM-kills
  # the container if a rogue worker leaks memory, isolating the failure.
  celery-scoring:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    mem_limit: 2048m          # 32 workers × ~50 MB = 1.6 GB working set + 448 MB overhead
    memswap_limit: 2048m
    env_file:
      - ./django-backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-backend/api:/app/api              # live code sync
      - ./django-backend/clap_backend:/app/clap_backend
      - ./django-backend/media:/app/media
    command: >
      python -m celery -A clap_backend worker
        --loglevel=info
        --queues=rule_scoring,email
        --concurrency=32
        --hostname=scoring@%h
        --max-tasks-per-child=500

  # ── Celery Beat: Periodic task scheduler ────────────────────────
  # Schedules:
  #   • DLQ sweeper every 15 minutes
  #   • Quota status reporter every 5 minutes
  # Only ONE beat instance should ever run — do not scale this service.
  celery-beat:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    mem_limit: 256m           # Beat is a scheduler only — minimal memory footprint
    memswap_limit: 256m
    env_file:
      - ./django-backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-backend/api:/app/api              # live code sync
      - ./django-backend/clap_backend:/app/clap_backend
    command: >
      python -m celery -A clap_backend beat
        --loglevel=info
        --scheduler celery.beat:PersistentScheduler

  # ── Flower: Celery worker monitoring UI ─────────────────────────
  # P2-11: Real-time visibility into Celery queue depth, task rates,
  # worker status, and failed tasks. Accessible at http://localhost:5555
  # (or via SSH tunnel: ssh -L 5555:localhost:5555 ubuntu@<ec2-ip>)
  #
  # SECURITY: flower is NOT exposed to the public internet.
  # Port 5555 is bound to 127.0.0.1 only (localhost).
  # Access via SSH tunnel from your local machine:
  #   ssh -L 5555:localhost:5555 -i clap-production-key.pem ubuntu@13.126.150.34
  #   Then open: http://localhost:5555
  flower:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - ./django-backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    ports:
      - "127.0.0.1:5555:5555"    # localhost only — never expose publicly
    depends_on:
      redis:
        condition: service_healthy
    command: >
      python -m celery -A clap_backend flower
        --port=5555
        --url_prefix=flower
        --persistent=True
        --db=/tmp/flower.db
        --max_tasks=10000

  # ── SSL Certificate Monitor ──────────────────────────────────────
  # P2-8: Checks SSL certificate expiry daily and logs a WARNING when
  # cert expires within 14 days. Pair with log alerting (CloudWatch,
  # Datadog, etc.) to trigger a notification before expiry.
  #
  # How to receive alerts:
  #   1. CloudWatch Logs: create a metric filter on "SSL_CERT_EXPIRY_WARNING"
  #      and attach an alarm → SNS → email/Slack.
  #   2. Simple: run `docker compose logs cert-monitor | grep WARNING` in cron.
  #   3. Or just watch for the WARNING log in your centralised log viewer.
  cert-monitor:
    image: alpine:latest
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt:ro
    # Check daily. Log expiry days so CloudWatch/Datadog can alert on WARNING.
    entrypoint: >
      /bin/sh -c '
        apk add --quiet openssl 2>/dev/null || true;
        while true; do
          CERT=/etc/letsencrypt/live/api.sanjivo.com/fullchain.pem;
          if [ -f "$$CERT" ]; then
            EXPIRY=$$(openssl x509 -enddate -noout -in "$$CERT" 2>/dev/null | cut -d= -f2);
            if ! openssl x509 -checkend 0 -noout -in "$$CERT" 2>/dev/null; then
              echo "[SSL_CERT_EXPIRED] Certificate has EXPIRED ($$EXPIRY) — RENEW IMMEDIATELY";
            elif ! openssl x509 -checkend 1209600 -noout -in "$$CERT" 2>/dev/null; then
              echo "[SSL_CERT_EXPIRY_WARNING] Certificate expires within 14 days! ($$EXPIRY) — RENEW IMMEDIATELY";
            elif ! openssl x509 -checkend 2592000 -noout -in "$$CERT" 2>/dev/null; then
              echo "[SSL_CERT_EXPIRY_WARNING] Certificate expires within 30 days ($$EXPIRY)";
            else
              echo "[SSL_CERT_OK] Certificate is valid and not expiring soon ($$EXPIRY)";
            fi;
          else
            echo "[SSL_CERT_MISSING] Certificate file not found at $$CERT";
          fi;
          sleep 86400;
        done
      '

# ── Named volumes ────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
