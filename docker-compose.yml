# ================================================================
# CLAP Full-Stack — Docker Compose
# ================================================================
# Services:
#   redis          — Message broker + result backend + rate-limit cache
#   django         — Django API server (Gunicorn, gthread workers)
#   celery-llm     — LLM evaluation tasks (low concurrency, memory-intensive)
#   celery-reports — PDF report generation (low concurrency, memory-intensive)
#   celery-scoring — Rule-based scoring + email (high concurrency, lightweight)
#   celery-beat    — Periodic task scheduler (DLQ sweeper every 15 min)
#
# Usage:
#   First time:
#     cp django-backend/.env.example django-backend/.env
#     # Fill in django-backend/.env with your values, then:
#     docker compose up --build
#
#   Daily:
#     docker compose up          # start all services
#     docker compose down        # stop and remove containers
#     docker compose logs -f     # follow all logs
#     docker compose logs -f django celery-llm  # follow specific services
#
#   Run migrations (first time or after git pull):
#     docker compose exec django python manage.py migrate
#
#   Django shell:
#     docker compose exec django python manage.py shell
#
# Scaling (horizontal, production):
#   docker compose up --scale celery-llm=2 --scale celery-scoring=3
# ================================================================

services:

  # ── Nginx Reverse Proxy ──────────────────────────────────────────
  # Entry point for all HTTP traffic on port 80.
  # Provides: rate limiting, gzip, client buffering, X-User-Id strip,
  # real-IP forwarding, keepalive to Gunicorn, security headers.
  #
  # TLS (HTTPS): add a port 443 server block + Certbot/ACM in production.
  # Scale: nginx:1.25-alpine handles 10 000+ concurrent connections on one core.
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data/certbot/conf:/etc/letsencrypt:ro
      - ./data/certbot/www:/var/www/certbot:ro
    depends_on:
      django:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider --no-check-certificate https://127.0.0.1/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Certbot: Let's Encrypt SSL certificate manager ───────────────
  # First-time setup: run scripts/init-ssl.sh (creates and stores cert)
  # Ongoing: this service auto-renews every 12 hours (certs expire in 90 days)
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt
      - ./data/certbot/www:/var/www/certbot
    # Check for renewal every 12 hours; Let's Encrypt renews within 30 days of expiry
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

  # ── Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-SANJIVO_CLAP}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── PgBouncer: Connection Pooler ─────────────────────────────────
  # Sits between Django/Celery and PostgreSQL (or Aurora in production).
  #
  # WHY THIS IS CRITICAL FOR 3000 STUDENTS:
  #   Django gthread: 5 workers × 8 threads = 40 threads.
  #   Celery workers: 12 + 2 + 2 = 16 concurrent workers.
  #   Total direct DB connections without pooling: ~56, growing on bursts.
  #   Aurora Serverless max_connections = GREATEST(mem/9531392, 100).
  #   Under peak load (worker recycles, connection churn) direct connections
  #   can spike 3-5x, exhausting the DB connection limit and causing:
  #   "FATAL: remaining connection slots reserved for replication" errors.
  #
  # HOW PGBOUNCER SOLVES THIS:
  #   pool_mode = transaction: Django acquires a DB connection only for the
  #   duration of a transaction (typically 5-50ms), then releases it.
  #   default_pool_size = 20: only 20 real DB connections maintained.
  #   400 Django/Celery clients can multiplex through those 20 connections.
  #   DB connection count stays flat regardless of user load.
  #
  # LOCAL DEV: proxies to the local `db` service (postgres:5432)
  # PRODUCTION: set PGBOUNCER_DB_HOST=<aurora-endpoint> in .env
  #
  # Django connects to: pgbouncer:5432 (via DB_HOST=pgbouncer in env_file)
  # PgBouncer connects to: ${PGBOUNCER_DB_HOST:-db}:${PGBOUNCER_DB_PORT:-5432}
  pgbouncer:
    # edoburu/pgbouncer: actively maintained, Docker Hub, Alpine-based.
    # Bitnami deprecated their Docker Hub images in 2024 — use this instead.
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      # ── Target database (real Postgres / Aurora) ──────────────────
      DB_HOST: ${PGBOUNCER_DB_HOST:-db}
      DB_PORT: ${PGBOUNCER_DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-postgres}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-SANJIVO_CLAP}
      # ── Pool configuration ────────────────────────────────────────
      # transaction mode: connection released after each transaction.
      # Most efficient for Django's short-lived request/response cycle.
      POOL_MODE: transaction
      # 20 real DB connections shared across 400 Django/Celery clients.
      # Increase if you see "no more connections allowed" errors.
      DEFAULT_POOL_SIZE: "20"
      # 5 extra connections reserved for admin + spike absorption.
      RESERVE_POOL_SIZE: "5"
      # 400 client connections allowed (5w×8t + 16 celery + headroom).
      MAX_CLIENT_CONN: "400"
      # Kill idle server connections after 10 minutes (prevents Aurora stale).
      SERVER_IDLE_TIMEOUT: "600"
      # Kill idle client connections after 10 minutes.
      CLIENT_IDLE_TIMEOUT: "600"
      # Log level — warning keeps logs quiet in production.
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"
    ports:
      - "5432:5432"    # expose on host for local psql/migrations
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "5432", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # P1-3: Redis persistence + safe eviction policy
    #
    # volatile-lru (NOT allkeys-lru):
    #   Only evicts keys that have a TTL set. Rate-limit buckets and JWT tokens
    #   have TTLs → eligible for eviction (fine — they're transient).
    #   Celery task queue keys (Redis lists) have NO TTL → never evicted.
    #   allkeys-lru would evict Celery tasks under memory pressure, losing
    #   pending scoring jobs for 1000 students. volatile-lru prevents this.
    #
    # appendonly yes + appendfsync everysec:
    #   AOF persistence: every write is logged to disk (flushed every 1s).
    #   On crash/OOM-kill, Redis replays the AOF on restart — tasks survive.
    #   Max data loss: 1 second of writes (acceptable for a test platform).
    #   everysec is the best balance between durability and write throughput.
    command: >
      redis-server
        --maxmemory 1gb
        --maxmemory-policy volatile-lru
        --appendonly yes
        --appendfsync everysec
        --auto-aof-rewrite-percentage 100
        --auto-aof-rewrite-min-size 64mb
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Django API server ───────────────────────────────────────────
  django:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./django-backend/.env
    environment:
      # Override Redis URLs to use the compose service name
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      # 5 workers × 8 threads = 40 concurrent requests — handles 3000 concurrent users
      # Workers: (2×CPU)+1 = 5 for 2-vCPU EC2 (full formula, was under-provisioned at 4)
      # Threads: 8 per worker — gthread handles I/O-bound Django well; each thread blocks
      #          on DB query ~10-50ms, so 40 threads sustain ~800-4000 req/s
      # Memory:  5 workers × ~200MB (preload_app CoW) = ~1GB total — safe on t3.large+
      # DB conns: 5 × 8 = 40 persistent connections to Aurora (CONN_MAX_AGE=600)
      GUNICORN_WORKERS: "5"
      GUNICORN_THREADS: "8"
      GUNICORN_TIMEOUT: "120"
      # Recycle workers after 2000 requests (±200 jitter) to flush any ORM connection
      # or memory drift — spread restarts so no thundering herd on simultaneous recycle
      GUNICORN_MAX_REQUESTS: "2000"
      GUNICORN_MAX_REQUESTS_JITTER: "200"
      # Skip automatic migrations for production-style external DBs
      RUN_MIGRATIONS: "false"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-backend/api:/app/api          # live code sync — no rebuild needed
      - ./django-backend/clap_backend:/app/clap_backend
      - ./django-backend/media:/app/media
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')\" 2>/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Celery Worker: LLM evaluation ───────────────────────────────
  # Queue: llm_evaluation
  #
  # Rate-limit strategy (gpt-4o — Tier 1, 3 primary keys):
  #   • gpt-4o: 500 RPM/key × 3 keys = 1 500 RPM effective throughput.
  #   • Whisper: 50 RPM/key × 3 keys = 150 RPM (tracked separately in Redis).
  #   • No Celery task-level rate_limit — QuotaTracker is the authoritative limiter.
  #   • concurrency=2: 2 parallel LLM+Whisper calls — safe at Tier 1 RPM headroom.
  #     Each call takes 3-20s so 2 concurrent workers ≈ 6-40 effective RPM per worker.
  #   • Scale concurrency to 4 on Tier 2+ (5 000 RPM/key).
  #   • Scale horizontally with: docker compose up --scale celery-llm=2
  #
  # max-tasks-per-child=10: recycles worker after 10 tasks.
  # Audio preprocessing (FFmpeg denoising) runs here — each task leaks ~50MB
  # of subprocess memory. At 20 tasks that's ~1GB → OOM kill → silent worker
  # death. Lowering to 10 keeps peak RSS under 600MB, well within safe limits.
  # mem_limit=1.5g: Docker OOM kill at 1.5GB as a hard safety net.
  celery-llm:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    mem_limit: 1536m          # P1-6: hard OOM kill at 1.5 GB (FFmpeg leak safety net)
    memswap_limit: 1536m      # disable swap — OOM-kill immediately, no swap thrash
    env_file:
      - ./django-backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-backend/api:/app/api              # live code sync
      - ./django-backend/clap_backend:/app/clap_backend
      - ./django-backend/media:/app/media
    command: >
      python -m celery -A clap_backend worker
        --loglevel=info
        --queues=llm_evaluation
        --concurrency=2
        --hostname=llm@%h
        --max-tasks-per-child=10

  # ── Celery Worker: Report generation ───────────────────────────
  # Queue: report_gen
  # Concurrency: 2  (PDF generation can be memory-intensive)
  celery-reports:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - ./django-backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-backend/api:/app/api              # live code sync
      - ./django-backend/clap_backend:/app/clap_backend
      - ./django-backend/media:/app/media
    command: >
      python -m celery -A clap_backend worker
        --loglevel=info
        --queues=report_gen
        --concurrency=2
        --hostname=reports@%h
        --max-tasks-per-child=100

  # ── Celery Worker: Rule scoring + Email ─────────────────────────
  # Queues: rule_scoring, email
  # Concurrency: 8  (lightweight, fast tasks — pure DB + rule logic)
  celery-scoring:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - ./django-backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-backend/api:/app/api              # live code sync
      - ./django-backend/clap_backend:/app/clap_backend
      - ./django-backend/media:/app/media
    command: >
      python -m celery -A clap_backend worker
        --loglevel=info
        --queues=rule_scoring,email
        --concurrency=12
        --hostname=scoring@%h
        --max-tasks-per-child=1000

  # ── Celery Beat: Periodic task scheduler ────────────────────────
  # Schedules:
  #   • DLQ sweeper every 15 minutes
  #   • Quota status reporter every 5 minutes
  # Only ONE beat instance should ever run — do not scale this service.
  celery-beat:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - ./django-backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./django-backend/api:/app/api              # live code sync
      - ./django-backend/clap_backend:/app/clap_backend
    command: >
      python -m celery -A clap_backend beat
        --loglevel=info
        --scheduler celery.beat:PersistentScheduler

  # ── Flower: Celery worker monitoring UI ─────────────────────────
  # P2-11: Real-time visibility into Celery queue depth, task rates,
  # worker status, and failed tasks. Accessible at http://localhost:5555
  # (or via SSH tunnel: ssh -L 5555:localhost:5555 ubuntu@<ec2-ip>)
  #
  # SECURITY: flower is NOT exposed to the public internet.
  # Port 5555 is bound to 127.0.0.1 only (localhost).
  # Access via SSH tunnel from your local machine:
  #   ssh -L 5555:localhost:5555 -i clap-production-key.pem ubuntu@13.203.120.191
  #   Then open: http://localhost:5555
  flower:
    image: clap-backend:latest
    build:
      context: ./django-backend
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    env_file:
      - ./django-backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/2"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
    ports:
      - "127.0.0.1:5555:5555"    # localhost only — never expose publicly
    depends_on:
      redis:
        condition: service_healthy
    command: >
      python -m celery -A clap_backend flower
        --port=5555
        --url_prefix=flower
        --persistent=True
        --db=/tmp/flower.db
        --max_tasks=10000

  # ── SSL Certificate Monitor ──────────────────────────────────────
  # P2-8: Checks SSL certificate expiry daily and logs a WARNING when
  # cert expires within 14 days. Pair with log alerting (CloudWatch,
  # Datadog, etc.) to trigger a notification before expiry.
  #
  # How to receive alerts:
  #   1. CloudWatch Logs: create a metric filter on "SSL_CERT_EXPIRY_WARNING"
  #      and attach an alarm → SNS → email/Slack.
  #   2. Simple: run `docker compose logs cert-monitor | grep WARNING` in cron.
  #   3. Or just watch for the WARNING log in your centralised log viewer.
  cert-monitor:
    image: alpine:latest
    restart: unless-stopped
    volumes:
      - ./data/certbot/conf:/etc/letsencrypt:ro
    # Check daily. Log expiry days so CloudWatch/Datadog can alert on WARNING.
    entrypoint: >
      /bin/sh -c '
        while true; do
          CERT=/etc/letsencrypt/live/clap.sanjivo.com/fullchain.pem;
          if [ -f "$$CERT" ]; then
            EXPIRY=$$(openssl x509 -enddate -noout -in "$$CERT" 2>/dev/null | cut -d= -f2);
            EXPIRY_EPOCH=$$(date -d "$$EXPIRY" +%s 2>/dev/null || date -jf "%b %e %H:%M:%S %Y %Z" "$$EXPIRY" +%s 2>/dev/null);
            NOW_EPOCH=$$(date +%s);
            DAYS_LEFT=$$(( (EXPIRY_EPOCH - NOW_EPOCH) / 86400 ));
            if [ "$$DAYS_LEFT" -le 14 ]; then
              echo "[SSL_CERT_EXPIRY_WARNING] Certificate expires in $$DAYS_LEFT days! ($$EXPIRY) — RENEW IMMEDIATELY";
            else
              echo "[SSL_CERT_OK] Certificate valid for $$DAYS_LEFT more days (expires $$EXPIRY)";
            fi;
          else
            echo "[SSL_CERT_MISSING] Certificate file not found at $$CERT";
          fi;
          sleep 86400;
        done
      '

# ── Named volumes ────────────────────────────────────────────────
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
