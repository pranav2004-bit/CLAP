# ================================================================
# CLAP Nginx Reverse Proxy — Production Configuration
# ================================================================
# Port 80  → ACME HTTP-01 challenge + permanent redirect to HTTPS
# Port 443 → TLS termination + proxy to Gunicorn (Django)
#
# Responsibilities:
#   1. Rate-limit abuse at the network layer — before Python runs
#   2. Gzip compress JSON API responses (~70% bandwidth saving)
#   3. Buffer slow HTTP clients so Gunicorn workers are freed fast
#   4. Strip X-User-Id to prevent identity spoofing by clients
#   5. Pass real client IP for Django's Redis rate-limit middleware
#   6. Reuse keepalive connections to Gunicorn (no TCP handshake per request)
#   7. Enforce client body size limit (audio uploads capped at 15 MB)
#   8. HSTS header enforces HTTPS in browser for 2 years
#
# Rate Limiting Strategy (enterprise — 3000 concurrent students, designed for 6000+):
#   PROBLEM:  $binary_remote_addr (IP) fails in campus/institution environments
#             where thousands of students share ONE NAT IP address. All students
#             compete for a single shared bucket → legitimate requests get blocked.
#
#   SOLUTION: Use the JWT Bearer token as the rate limit key for authenticated
#             requests. Every student has a unique session token, so each student
#             gets their own private rate limit bucket — completely independent of
#             the IP address they share with others.
#
#   FALLBACK: Requests without a Bearer token (login, public endpoints)
#             fall back to per-IP rate limiting as a light DDoS shield only.
#             Brute force protection for login is handled by Django (Redis-backed
#             per-email lockout + 200/min per-IP cap) — NOT by nginx.
#             This correctly handles campus NAT where thousands of students share
#             one IP: Django locks the individual email, not the entire campus.
#
#   OPTIONS:  CORS preflight requests (OPTIONS method) carry no Authorization
#             header and MUST NEVER be rate limited. nginx skips limit_req
#             entirely when the zone key resolves to an empty string.
# ================================================================

worker_processes      auto;           # one nginx worker per CPU core
worker_rlimit_nofile  65535;          # raise open-file limit for high concurrency

events {
    worker_connections 16384;         # 2 workers × 16,384 = 32,768 max connections (3000 users × ~10 conns each)
    multi_accept       on;            # accept all pending connections per event loop
    use                epoll;         # most efficient I/O model on Linux
}

http {
    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    server_tokens     off;            # never expose nginx version in headers

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip             on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  4;               # good ratio without burning CPU
    gzip_min_length  1024;            # skip tiny responses (no gain <1KB)
    gzip_types
        application/json
        text/plain
        text/css
        application/javascript;

    # ── Rate Limiting: Per-Student (JWT-based), not per-IP ────────────────────
    #
    # Step 1: Choose the rate limit key based on Authorization header.
    #
    #   Authenticated (has Bearer token) → use the JWT token as the key.
    #     Each student's JWT is unique to their session. Two students on the
    #     same campus IP get completely separate 30 req/s buckets.
    #
    #   Unauthenticated (no Bearer token) → fall back to IP address.
    #     Protects login/register endpoints from bots and brute force attacks.
    #
    map $http_authorization $auth_rate_key {
        default       $binary_remote_addr;  # no token  → per IP (anonymous)
        "~^Bearer\s+" $http_authorization;  # has token → per JWT (per student)
    }

    # Step 2: Exempt OPTIONS CORS preflights from ALL rate limiting.
    #
    #   Browser CORS preflights (OPTIONS) carry no Authorization header and
    #   must NEVER be blocked. If a preflight is blocked (429), the browser
    #   cannot complete its CORS security check and throws a TypeError —
    #   which appears as "Network error" in the student's interface even
    #   though the backend is healthy.
    #
    #   nginx skips limit_req entirely when the zone key is an empty string.
    #
    map $request_method $rate_key {
        OPTIONS   "";              # empty → nginx skips limit_req for preflights
        default   $auth_rate_key;  # all other methods use auth-based key above
    }

    # ── Zone Definitions ──────────────────────────────────────────────────────
    #
    # api_zone: Per-student authenticated rate limiting.
    #   Key    : JWT token (authenticated) or IP (unauthenticated)
    #   Rate   : 30 req/s per student
    #   Burst  : configured per-location (see below)
    #   Memory : 50 MB → ~780,000 concurrent states (6000 students × 130× margin)
    #   Typical student usage during test: ~0.43 req/s → 70× headroom per student
    #
    # NOTE: auth_zone (5r/m per IP) was REMOVED — it blocked campus environments
    #   where thousands of students share one NAT IP and all attempt login simultaneously.
    #   Brute force protection for login is handled entirely by Django's auth.py:
    #     • Per-identifier lockout : 5 failed attempts / 5 min → 15 min lockout
    #     • Per-IP login limit     : 200 logins/min per IP (campus-safe)
    #   Django's Redis-backed protection is smarter (per-email, not per-IP only)
    #   and correctly handles shared campus IPs without blocking legitimate users.
    #
    limit_req_zone $rate_key zone=api_zone:50m rate=30r/s;

    # login_zone: Campus-safe queue for login endpoint (unauthenticated, per-IP key).
    #   PROBLEM:  api_zone (30r/s) is too slow for 3000 students logging in simultaneously
    #             from a shared campus IP. Students queue fine but wait up to 100 seconds.
    #   SOLUTION: Dedicated login zone at 200r/s — bcrypt on 5 workers × 8 threads can
    #             sustain exactly 200 verifications/sec. Burst=1000 with DELAY (no nodelay)
    #             queues campus login bursts in nginx, not in Gunicorn.
    #             3000 simultaneous logins: 1000 burst + 2000 @ 200r/s = drained in ~10s.
    #             Max wait in queue: ~5 seconds — well within browser timeout.
    #   Key    : IP address (login has no Bearer token yet)
    #   Rate   : 200 req/s per IP
    #   Burst  : 1000 with delay (queue, never reject bursts)
    #   Memory : 10 MB → sufficient for all campus IPs
    #
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=200r/s;

    limit_req_status 429;

    # ── CORS Origin Allow-list ────────────────────────────────────────────────
    # Maps incoming Origin header to itself for known origins, empty otherwise.
    # Used by @rate_limited and @upstream_error named locations to add CORS
    # headers to nginx-generated error responses (429, 502, 503, 504) so the
    # browser receives a proper JSON error instead of throwing TypeError.
    #
    map $http_origin $cors_origin {
        "https://clap.sanjivo.com"      "https://clap.sanjivo.com";
        "https://clap-wheat.vercel.app" "https://clap-wheat.vercel.app";
        "http://localhost:3000"         "http://localhost:3000";
        default                         "";
    }

    # ── Upstream: Gunicorn ────────────────────────────────────────────────────
    upstream django_backend {
        server    django:8000;
        keepalive 64;             # reuse up to 64 idle connections (5 workers × 8 threads = 40 + headroom)
    }

    # ── HTTP: ACME challenge + redirect to HTTPS ──────────────────────────────
    server {
        listen      80;
        server_name api.sanjivo.com;

        # Let's Encrypt HTTP-01 challenge (served from certbot webroot volume)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS permanently
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: TLS termination + full proxy to Gunicorn ──────────────────────
    server {
        listen      443 ssl;
        server_name api.sanjivo.com;

        # ── TLS certificates (managed by Certbot / Let's Encrypt) ─────────────
        ssl_certificate     /etc/letsencrypt/live/api.sanjivo.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.sanjivo.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Upload size limit ──────────────────────────────────────────────────
        client_max_body_size 15m;

        # ── Proxy timeouts ─────────────────────────────────────────────────────
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        send_timeout          120s;

        # ── Proxy headers passed to Django ─────────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Security: strip X-User-Id so clients cannot spoof identity ─────────
        proxy_set_header X-User-Id "";

        # ── HTTP/1.1 keepalive to Gunicorn upstream ────────────────────────────
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # ── Security response headers ──────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                         always;
        add_header X-Frame-Options           "SAMEORIGIN"                      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── CORS on nginx-generated error responses ONLY ───────────────────────
        # Django's corsheaders middleware handles CORS for all proxied responses.
        # When nginx itself rejects a request (429, 502, 503, 504), the response
        # never reaches Django, so CORS headers are missing — the browser throws
        # TypeError. Named locations add CORS only to nginx-owned responses,
        # preventing duplicate header conflicts with Django.
        #
        error_page 429 = @rate_limited;
        error_page 502 503 504 = @upstream_error;

        location @rate_limited {
            default_type application/json;
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            return 429 '{"error":"rate_limited","message":"Too many requests. Please slow down."}';
        }

        location @upstream_error {
            default_type application/json;
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true"       always;
            return 502 '{"error":"server_error","message":"Server temporarily unavailable."}';
        }

        # ── Health check: rate-limited to protect Django during banner ping storms ─
        # BackendStatusBanner in the frontend pings /api/health every 5s (with jitter).
        # Without a rate limit, 3000 students' banners activating simultaneously
        # generate 600 synchronized req/s — enough to re-overwhelm a recovering Django.
        #
        # limit_req zone=api_zone burst=10 nodelay:
        #   Authenticated students (JWT): each has own bucket → each can ping freely.
        #   Unauthenticated health pings (no JWT, banner uses bare fetch):
        #     Falls back to IP key → campus students share 30r/s but burst=10 absorbs
        #     the first 10 pings per IP, then drains at 30r/s.  More than sufficient
        #     since the jitter already spreads campus pings across a 15-second window.
        #
        # access_log off: health pings happen every 5-15s per student — logging them
        # would generate 200-600 log lines/second of pure noise.
        #
        location = /api/health/ {
            access_log off;
            limit_req zone=api_zone burst=10 nodelay;
            proxy_pass http://django_backend;
        }

        # ── SSE (Server-Sent Events): disable all buffering ────────────────────
        location ~ /stream$ {
            limit_req zone=api_zone burst=20 nodelay;
            proxy_pass                 http://django_backend;
            proxy_buffering            off;
            proxy_cache                off;
            proxy_read_timeout         3600s;
            proxy_send_timeout         3600s;
            proxy_set_header           Connection '';
            proxy_http_version         1.1;
            chunked_transfer_encoding  on;
        }

        # ── Login: campus login queue — burst without nodelay ──────────────────
        # login_zone (200r/s) + burst=1000 WITHOUT nodelay:
        #   → nginx queues campus login bursts (never 429s)
        #   → 3000 simultaneous logins drain in ~10 seconds
        #   → brute force protection is handled by Django (per-email lockout + 200/min per-IP)
        #
        location ~ ^/api/auth/login(/|$) {
            limit_req zone=login_zone burst=1000;
            proxy_pass http://django_backend;
        }

        # ── All other auth endpoints (refresh, me, logout) ────────────────────
        # /auth/refresh carries the old JWT → per-student key via api_zone.
        # Burst=50: 3000 students × multiple tabs all refreshing tokens on reconnect.
        #
        location ~ ^/api/auth/ {
            limit_req zone=api_zone burst=50 nodelay;
            proxy_pass http://django_backend;
        }

        # ── Test start / auto-submit: high burst for simultaneous actions ──────
        # When a test begins, all 3000 students click "Start" within seconds of each
        # other. Per-student JWT key means they don't compete with each other —
        # each student has their own independent 30r/s bucket.
        # Burst=500: absorbs repeated clicks, reconnect storms, and page reload retries.
        #
        location ~ ^/api/student/.+/(auto-submit|start)(/|$) {
            limit_req zone=api_zone burst=500 nodelay;
            proxy_request_buffering off;
            proxy_pass http://django_backend;
        }

        # ── Audio upload URL: stream without buffering ─────────────────────────
        # Burst=100: each student has 1 audio recording per component; 3000 students
        # submitting audio simultaneously — per-JWT key means no cross-student contention.
        location ~ ^/api/student/.+/audio {
            limit_req zone=api_zone burst=100 nodelay;
            proxy_request_buffering off;
            proxy_pass http://django_backend;
        }

        # ── All other API and app requests ─────────────────────────────────────
        # Burst=200: page loads fire 5-10 parallel requests; auto-save fires every
        # 30s; timer polls every 30s. Per-student JWT key — no cross-student contention.
        # 200 burst absorbs reconnect storms (student regains WiFi, all tabs retry at once).
        #
        location / {
            limit_req zone=api_zone burst=200 nodelay;
            proxy_pass http://django_backend;
        }
    }
}
