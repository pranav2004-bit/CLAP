# ================================================================
# CLAP Nginx Reverse Proxy — Production Configuration
# ================================================================
# Sits in front of Gunicorn (Django) on port 80.
#
# Responsibilities:
#   1. Rate-limit abuse at the network layer — before Python runs
#   2. Gzip compress JSON API responses (~70% bandwidth saving)
#   3. Buffer slow HTTP clients so Gunicorn workers are freed fast
#   4. Strip X-User-Id to prevent identity spoofing by clients
#   5. Pass real client IP for Django's Redis rate-limit middleware
#   6. Reuse keepalive connections to Gunicorn (no TCP handshake per request)
#   7. Enforce client body size limit (audio uploads capped at 15 MB)
#
# TLS / HTTPS:
#   In production, add a second server{} block for port 443 and use
#   Certbot (Let's Encrypt) or your load-balancer for SSL termination.
#   Nginx passes X-Forwarded-Proto: https so Django enforces HSTS.
# ================================================================

worker_processes auto;          # one Nginx worker per CPU core

events {
    worker_connections 1024;    # max simultaneous connections per worker
    multi_accept       on;      # accept all pending connections per event loop
}

http {
    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    server_tokens     off;      # never expose Nginx version in response headers

    # ── Gzip compression ──────────────────────────────────────────────────────
    # Compresses JSON API responses so 100-user concurrent traffic is lighter
    gzip             on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  4;         # level 4: good ratio without burning CPU
    gzip_min_length  1024;      # skip tiny responses (no benefit compressing <1KB)
    gzip_types
        application/json
        text/plain
        text/html
        text/css
        application/javascript;

    # ── Rate-limit zones (stored in shared memory) ────────────────────────────
    #
    # api_general — 5 req/s per IP = 300 req/min
    #   Mirrors DRF UserRateThrottle (300/min for authenticated users).
    #   Applied to all general API calls.
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=5r/s;

    # api_auth — 1 req/s per IP = 60 req/min
    #   Applied to /api/auth/ (login, token refresh).
    #   Prevents brute-force credential stuffing.
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=1r/s;

    # api_submit — 2 req/min per IP
    #   Applied to test-start and test-submit endpoints.
    #   Prevents rapid re-submission / pipeline flooding.
    limit_req_zone $binary_remote_addr zone=api_submit:10m rate=2r/m;

    # Return 429 (Too Many Requests) when rate limit is exceeded
    limit_req_status 429;

    # ── Upstream: Gunicorn ─────────────────────────────────────────────────────
    upstream django_backend {
        server  django:8000;
        keepalive 32;           # reuse up to 32 idle connections to Gunicorn
    }

    server {
        listen      80;
        server_name _;          # catch-all; replace with your domain in production

        # ── Upload size limit ─────────────────────────────────────────────────
        # Audio recordings max 10 MB + multipart overhead = 15 MB total cap
        client_max_body_size 15m;

        # ── Proxy timeouts ────────────────────────────────────────────────────
        # connect: how long to wait for Gunicorn to accept the connection
        # send/read: how long to wait for Gunicorn to process the request
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        send_timeout          120s;

        # ── Proxy headers passed to Django ────────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Security: strip X-User-Id so clients cannot spoof identity ────────
        # Django's TRUST_X_USER_ID_HEADER=False means only JWT is accepted.
        # This header must not reach Django from external clients.
        proxy_set_header X-User-Id "";

        # ── HTTP/1.1 keepalive to Gunicorn upstream ───────────────────────────
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # ── Security response headers ─────────────────────────────────────────
        add_header X-Content-Type-Options  "nosniff"                         always;
        add_header X-Frame-Options         "SAMEORIGIN"                      always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

        # ── Health check: no rate limit, no logging ───────────────────────────
        location = /api/health/ {
            access_log off;
            proxy_pass http://django_backend;
        }

        # ── SSE (Server-Sent Events): disable all buffering ───────────────────
        # Nginx buffers responses by default — this silently breaks SSE because
        # the client never receives events until the buffer fills.
        # These settings force byte-by-byte streaming for all /stream endpoints.
        location ~ /stream$ {
            limit_req zone=api_general burst=5 nodelay;
            proxy_pass             http://django_backend;
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     3600s;   # hold connection up to 1 hour
            proxy_send_timeout     3600s;
            proxy_set_header       Connection '';
            proxy_http_version     1.1;
            chunked_transfer_encoding on;
        }

        # ── Auth endpoints: strict rate limit (brute-force guard) ─────────────
        location ~ ^/api/auth/ {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass http://django_backend;
        }

        # ── Test submissions: conservative rate limit ─────────────────────────
        # burst=3: allows 3 rapid submits then enforces 2/min
        location ~ ^/api/student/.+/(submit|start-attempt) {
            limit_req zone=api_submit burst=3 nodelay;
            # Stream body directly to Gunicorn — do not buffer in Nginx
            # Prevents holding up the connection while Gunicorn reads large payloads
            proxy_request_buffering off;
            proxy_pass http://django_backend;
        }

        # ── Audio uploads: stream directly without buffering ──────────────────
        # buffering off = Nginx starts forwarding bytes immediately
        # Gunicorn worker is released as soon as audio is fully received
        location ~ ^/api/student/.+/audio {
            limit_req zone=api_general burst=10 nodelay;
            proxy_request_buffering off;
            proxy_pass http://django_backend;
        }

        # ── All other API and app requests ───────────────────────────────────
        # burst=30: absorbs short spikes (e.g. admin dashboard loading 10 APIs at once)
        location / {
            limit_req zone=api_general burst=30 nodelay;
            proxy_pass http://django_backend;
        }
    }
}
