# ================================================================
# CLAP Nginx Reverse Proxy — Production Configuration
# ================================================================
# Port 80  → ACME HTTP-01 challenge + permanent redirect to HTTPS
# Port 443 → TLS termination + proxy to Gunicorn (Django)
#
# Responsibilities:
#   1. Rate-limit abuse at the network layer — before Python runs
#   2. Gzip compress JSON API responses (~70% bandwidth saving)
#   3. Buffer slow HTTP clients so Gunicorn workers are freed fast
#   4. Strip X-User-Id to prevent identity spoofing by clients
#   5. Pass real client IP for Django's Redis rate-limit middleware
#   6. Reuse keepalive connections to Gunicorn (no TCP handshake per request)
#   7. Enforce client body size limit (audio uploads capped at 15 MB)
#   8. HSTS header enforces HTTPS in browser for 2 years
# ================================================================

worker_processes auto;          # one Nginx worker per CPU core

events {
    worker_connections 1024;    # max simultaneous connections per worker
    multi_accept       on;      # accept all pending connections per event loop
}

http {
    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout 65;
    server_tokens     off;      # never expose Nginx version in response headers

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip             on;
    gzip_vary        on;
    gzip_proxied     any;
    gzip_comp_level  4;         # level 4: good ratio without burning CPU
    gzip_min_length  1024;      # skip tiny responses (no benefit compressing <1KB)
    gzip_types
        application/json
        text/plain
        text/css
        application/javascript;

    # ── Rate-limit zones (stored in shared memory) ────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=api_auth:10m   rate=1r/s;
    limit_req_zone $binary_remote_addr zone=api_submit:10m rate=2r/m;
    limit_req_status 429;

    # ── Upstream: Gunicorn ─────────────────────────────────────────────────────
    upstream django_backend {
        server    django:8000;
        keepalive 32;           # reuse up to 32 idle connections to Gunicorn
    }

    # ── HTTP: ACME challenge + redirect to HTTPS ──────────────────────────────
    server {
        listen      80;
        server_name api.sanjivo.com;

        # Let's Encrypt HTTP-01 challenge (served from certbot webroot volume)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS permanently
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS: TLS termination + full proxy to Gunicorn ───────────────────────
    server {
        listen      443 ssl;
        server_name api.sanjivo.com;

        # ── TLS certificates (managed by Certbot / Let's Encrypt) ─────────────
        ssl_certificate     /etc/letsencrypt/live/api.sanjivo.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.sanjivo.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Upload size limit ─────────────────────────────────────────────────
        client_max_body_size 15m;

        # ── Proxy timeouts ────────────────────────────────────────────────────
        proxy_connect_timeout  10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
        send_timeout          120s;

        # ── Proxy headers passed to Django ────────────────────────────────────
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Security: strip X-User-Id so clients cannot spoof identity ────────
        proxy_set_header X-User-Id "";

        # ── HTTP/1.1 keepalive to Gunicorn upstream ───────────────────────────
        proxy_http_version 1.1;
        proxy_set_header   Connection "";

        # ── Security response headers ─────────────────────────────────────────
        # HSTS: force HTTPS for 2 years, including subdomains
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff"                         always;
        add_header X-Frame-Options           "SAMEORIGIN"                      always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── Health check: no rate limit, no logging ───────────────────────────
        location = /api/health/ {
            access_log off;
            proxy_pass http://django_backend;
        }

        # ── SSE (Server-Sent Events): disable all buffering ───────────────────
        location ~ /stream$ {
            limit_req zone=api_general burst=5 nodelay;
            proxy_pass             http://django_backend;
            proxy_buffering        off;
            proxy_cache            off;
            proxy_read_timeout     3600s;
            proxy_send_timeout     3600s;
            proxy_set_header       Connection '';
            proxy_http_version     1.1;
            chunked_transfer_encoding on;
        }

        # ── Auth endpoints: strict rate limit (brute-force guard) ─────────────
        location ~ ^/api/auth/ {
            limit_req zone=api_auth burst=5 nodelay;
            proxy_pass http://django_backend;
        }

        # ── Test submissions: conservative rate limit ─────────────────────────
        location ~ ^/api/student/.+/(submit|start-attempt) {
            limit_req zone=api_submit burst=3 nodelay;
            proxy_request_buffering off;
            proxy_pass http://django_backend;
        }

        # ── Audio uploads: stream directly without buffering ──────────────────
        location ~ ^/api/student/.+/audio {
            limit_req zone=api_general burst=10 nodelay;
            proxy_request_buffering off;
            proxy_pass http://django_backend;
        }

        # ── All other API and app requests ────────────────────────────────────
        location / {
            limit_req zone=api_general burst=30 nodelay;
            proxy_pass http://django_backend;
        }
    }
}
