name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run Lint
      run: npm run lint

  # ── Backend — Django checks (fast, no Docker) ────────────────────────────────
  backend-check:
    name: Backend Django Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./django-backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: django-backend/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Django system check
      env:
        SECRET_KEY: 'ci-placeholder-key-not-used-in-production'
        DEBUG: 'True'
        STORAGE_PROVIDER: ''
        EMAIL_PROVIDER: 'console'
        LLM_PROVIDER: 'openai'
      run: python manage.py check --deploy 2>&1 | grep -v "^System check" || true
      # --deploy flag surfaces production-readiness warnings (HTTPS, HSTS, etc.)
      # We suppress the "System check identified N issue(s)" summary line; the
      # individual warnings are still printed for review.

    - name: Verify management command syntax
      env:
        SECRET_KEY: 'ci-placeholder-key-not-used-in-production'
        DEBUG: 'True'
        STORAGE_PROVIDER: ''
        EMAIL_PROVIDER: 'console'
        LLM_PROVIDER: 'openai'
      run: |
        python -m py_compile clap_backend/settings.py
        python -m py_compile api/management/commands/validate_schema.py
        python -m py_compile api/views/health.py
        python -m py_compile api/middleware/rate_limit.py

  # ── Backend — Security audit ─────────────────────────────────────────────────
  backend-security:
    name: Backend Dependency Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./django-backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: django-backend/requirements.txt

    - name: Install pip-audit
      run: pip install pip-audit

    - name: Audit dependencies for known CVEs
      # Fail the build if any HIGH or CRITICAL vulnerability is found.
      # pip-audit exits non-zero if vulnerabilities exist.
      run: pip-audit -r requirements.txt --strict

  # ── Docker image build ───────────────────────────────────────────────────────
  # F1: Ensures the Docker image builds cleanly on every PR.
  # Does NOT push to a registry (no credentials needed in CI).
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [backend-check]  # only build if Django checks pass

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build backend image (no push)
      uses: docker/build-push-action@v6
      with:
        context: ./django-backend
        file: ./django-backend/Dockerfile
        target: runtime
        push: false
        # Tag with git SHA so it can be referenced in deployment rollbacks (F3)
        tags: |
          clap-backend:${{ github.sha }}
          clap-backend:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          BUILDKIT_INLINE_CACHE=1

    - name: Smoke-test image — Django check inside container
      run: |
        docker run --rm \
          -e SECRET_KEY=ci-placeholder-key-not-used-in-production \
          -e DEBUG=True \
          -e STORAGE_PROVIDER= \
          -e EMAIL_PROVIDER=console \
          -e LLM_PROVIDER=openai \
          --entrypoint python \
          clap-backend:latest \
          manage.py check

  # ── Backend test (constraint verification) ───────────────────────────────────
  backend-test:
    name: Backend Test (Verify DB Constraints)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./django-backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: django-backend/requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify constraint script syntax
      run: python -m py_compile verify_db_constraint.py
