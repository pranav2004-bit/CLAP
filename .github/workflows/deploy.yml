name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # 600s = 10 minutes total SSH session budget:
          #   ~90s  image build (cached layers) + ~90s pgbouncer healthy
          #   + ~120s Django healthy (collectstatic + gunicorn boot)
          #   + ~30s migrations + nginx restart + prune = ~330s typical.
          #   600s gives comfortable headroom for cold builds (no layer cache).
          timeout: 600s
          script: |
            set -e
            cd /home/ubuntu/CLAP

            echo "==> Pulling latest code..."
            git stash --include-untracked || true
            git pull origin main

            echo "==> Rebuilding Django image..."
            docker-compose build django

            echo "==> Stopping and removing all app containers (prevents ContainerConfig KeyError on docker-compose 1.29.2)..."
            docker-compose stop django celery-llm celery-reports celery-scoring celery-beat pgbouncer
            docker-compose rm -f django celery-llm celery-reports celery-scoring celery-beat pgbouncer

            echo "==> Starting pgbouncer first and waiting for it to become healthy..."
            docker-compose up -d pgbouncer
            timeout 90 bash -c 'until [ "$(docker inspect --format={{.State.Health.Status}} clap_pgbouncer_1 2>/dev/null)" = "healthy" ]; do sleep 3; done'

            echo "==> Starting app services..."
            docker-compose up -d django celery-llm celery-reports celery-scoring celery-beat

            echo "==> Waiting for Django to become healthy..."
            echo "    (collectstatic + gunicorn boot with 16 threads can take up to 120s)"
            timeout 120 bash -c 'until [ "$(docker inspect --format={{.State.Health.Status}} clap_django_1 2>/dev/null)" = "healthy" ]; do sleep 3; done' \
              || { echo "Django did not become healthy in 120s — dumping logs:"; docker-compose logs --tail=40 django; exit 1; }

            echo "==> Running migrations..."
            docker-compose exec -T django python manage.py migrate --no-input

            echo "==> Reloading nginx to pick up new Django container..."
            docker-compose restart nginx

            echo "==> Pruning old images..."
            docker image prune -f

            echo "==> Deploy complete. Server IP: $(hostname -I | awk '{print $1}')"
