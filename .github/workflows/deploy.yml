name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy Backend to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          # 600s = 10 minutes total SSH session budget:
          #   ~90s  image build (cached layers) + ~90s pgbouncer healthy
          #   + ~120s Django healthy (collectstatic + gunicorn boot)
          #   + ~30s migrations + nginx restart + prune = ~330s typical.
          #   600s gives comfortable headroom for cold builds (no layer cache).
          timeout: 600s
          script: |
            set -e
            cd /home/ubuntu/CLAP

            echo "==> Pulling latest code..."
            git stash --include-untracked || true
            git pull origin main

            echo "==> Rebuilding Django image..."
            docker-compose build django

            # ── Prevent ContainerConfig KeyError (docker-compose 1.29.2 bug) ──────
            # Any container whose config changed (mem_limit, command, env, image)
            # must be stopped AND removed before docker-compose up recreates it.
            # docker-compose up --force-recreate fails with ContainerConfig KeyError
            # on stopped containers built from images that predate this docker version.
            # Safest fix: stop everything, remove all containers, start fresh in order.
            echo "==> Stopping all containers..."
            docker-compose stop || true

            echo "==> Removing all stopped containers (prevents ContainerConfig bug)..."
            docker-compose rm -f || true

            echo "==> Starting Redis and waiting for it to become healthy..."
            docker-compose up -d redis
            timeout 30 bash -c 'until docker-compose exec -T redis redis-cli ping 2>/dev/null | grep -q PONG; do sleep 2; done' \
              || { echo "Redis did not become healthy in 30s — dumping logs:"; docker-compose logs --tail=20 redis; exit 1; }

            echo "==> Starting PgBouncer and waiting for it to become healthy..."
            docker-compose up -d pgbouncer
            timeout 90 bash -c 'until [ "$(docker inspect --format={{.State.Health.Status}} clap_pgbouncer_1 2>/dev/null)" = "healthy" ]; do sleep 3; done' \
              || { echo "PgBouncer did not become healthy in 90s — dumping logs:"; docker-compose logs --tail=20 pgbouncer; exit 1; }

            echo "==> Starting Django and Celery workers..."
            docker-compose up -d django celery-llm celery-reports celery-scoring celery-beat

            echo "==> Waiting for Django to become healthy..."
            echo "    (collectstatic + gunicorn boot with 9 workers × 16 threads can take up to 150s)"
            timeout 150 bash -c 'until [ "$(docker inspect --format={{.State.Health.Status}} clap_django_1 2>/dev/null)" = "healthy" ]; do sleep 3; done' \
              || { echo "Django did not become healthy in 150s — dumping logs:"; docker-compose logs --tail=40 django; exit 1; }

            echo "==> Running migrations..."
            docker-compose exec -T django python manage.py migrate --no-input

            echo "==> Starting Nginx and Flower..."
            docker-compose up -d nginx flower

            echo "==> Pruning old images..."
            docker image prune -f

            echo "==> Deploy complete. Server IP: $(hostname -I | awk '{print $1}')"
